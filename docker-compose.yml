# Docker Compose file for School Wallet microservices backend stack
services:
  postgres:
    image: postgres:16-alpine
    container_name: sw-postgres
    environment:
      POSTGRES_USER: "${DB_USER_USERNAME:-Tienld}"
      POSTGRES_PASSWORD: "${DB_USER_PASSWORD:-123456}"
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER_USERNAME:-Tienld} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [school-wallet]

  redis:
    image: redis:7-alpine
    container_name: sw-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-123456}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-123456}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [school-wallet]

  activemq:
    image: apache/activemq-classic:6.1.4
    container_name: sw-activemq
    ports:
      - "61616:61616"   # OpenWire (JMS)
      - "8161:8161"     # Web console (admin/admin)
    networks: [school-wallet]

  # ── Service ──────────────────────────────────────────────────────────────--
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      DB_USER_URL: "jdbc:postgresql://postgres:5432/user_service"
      REDIS_HOST: "redis"
      WALLET_SERVICE_URL: "http://wallet-service:8082"
      NOTIFICATION_SERVICE_URL: "http://notification-service:8085"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    networks: [school-wallet]

  wallet-service:
    build: ./wallet-service
    container_name: wallet-service
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      DB_WALLET_URL: "jdbc:postgresql://postgres:5432/wallet_service"
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped
    networks: [school-wallet]

  transaction-service:
    build: ./transaction-service
    container_name: transaction-service
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      DB_TRANSACTION_URL: "jdbc:postgresql://postgres:5432/transaction_service"
      ACTIVEMQ_BROKER_URL: "tcp://activemq:61616"
      WALLET_SERVICE_URL: "http://wallet-service:8082"
      USER_SERVICE_URL: "http://user-service:8081"
    depends_on:
      postgres: { condition: service_healthy }
      activemq: { condition: service_started }
    restart: unless-stopped
    networks: [school-wallet]

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8085:8085"
    env_file:
      - .env
    environment:
      DB_NOTIFICATION_URL: "jdbc:postgresql://postgres:5432/notification_service"
      REDIS_HOST: "redis"
      ACTIVEMQ_BROKER_URL: "tcp://activemq:61616"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      activemq: { condition: service_started }
    restart: unless-stopped
    networks: [school-wallet]

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      USER_SERVICE_URL: "http://user-service:8081"
      WALLET_SERVICE_URL: "http://wallet-service:8082"
      TRANSACTION_SERVICE_URL: "http://transaction-service:8084"
      NOTIFICATION_SERVICE_URL: "http://notification-service:8085"
    depends_on:
      user-service: { condition: service_started }
      wallet-service: { condition: service_started }
      transaction-service: { condition: service_started }
      notification-service: { condition: service_started }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks: [school-wallet]

volumes:
  pgdata:

networks:
  school-wallet:
    driver: bridge

# School Wallet — compose: full backend stack with PostgreSQL, Redis, ActiveMQ, and microservices
# start:   docker compose up -d --build
# stop:        docker compose down            (giữ data)
#              docker compose down -v         (xoá luôn volume Postgres)
