server:
  port: 8085
spring:
  application:
    name: notification-service
  activemq:
    broker-url: "${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}"
    user: "${ACTIVEMQ_USER:admin}"
    password: "${ACTIVEMQ_PASSWORD:admin}"
    in-memory: false
  jms:
      # false = Queue
      # true  = Topic
      pub-sub-domain: true
  datasource:
    url: "${DB_NOTIFICATION_URL:jdbc:postgresql://localhost:5432/notification_service}"
    username: "${DB_NOTIFICATION_USERNAME:Tienld}"
    password: "${DB_NOTIFICATION_PASSWORD:123456}"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"
      password: "${REDIS_PASSWORD:123456}"
      timeout: 3000
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 3000

internal:
  secret: "${INTERNAL_SECRET}"
sendgrid:
  api-key: "${SENDGRID_API_KEY}"
  from-email: "${SENDGRID_FROM_EMAIL}"
  from-name: "School Wallet"
speedsms:
  access-token: "${SPEEDSMS_ACCESS_TOKEN}"
  sender: "${SPEEDSMS_SENDER}"
  type: 5
otp:
  expiration-minutes: 5
  max-attempts: 5
  resend-cooldown-seconds: 60
  token-expiration-minutes: 10