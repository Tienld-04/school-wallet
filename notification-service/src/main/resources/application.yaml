server:
  port: 8085
spring:
  application:
    name: notification-service
  activemq:
#    broker-url: "tcp://activemq:61616"
    broker-url: "tcp://localhost:61616"
    user: admin
    password: admin
    in-memory: false
  jms:
      # false = Queue
      # true  = Topic
      pub-sub-domain: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 3000
internal:
  secret: "${INTERNAL_SECRET}"
sendgrid:
  api-key: "${SENDGRID_API_KEY}"
  from-email: "${SENDGRID_FROM_EMAIL}"
  from-name: "School Wallet"

esms:
  api-key: "${ESMS_API_KEY}"
  secret-key: "${ESMS_SECRET_KEY}"
  sms-type: 8
otp:
  expiration-minutes: 5
  max-attempts: 5
  resend-cooldown-seconds: 60
  token-expiration-minutes: 10