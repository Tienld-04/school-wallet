server:
  port: 8084
  tomcat:
    threads:
      max: 60
      min-spare: 5
    accept-count: 50
    connection-timeout: 20s
spring:
  application:
    name: transaction-service
  jmx:
    enabled: false

  datasource:
    url: "${DB_TRANSACTION_URL:jdbc:postgresql://localhost:5432/transaction_service}"
    username: "${DB_TRANSACTION_USERNAME:Tienld}"
    password: "${DB_TRANSACTION_PASSWORD:123456}"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 10
      connection-timeout: 3000
      idle-timeout: 180000
      max-lifetime: 300000
  jpa:
    hibernate:
      ddl-auto: update   # validate | update | create | create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  activemq:
    broker-url: "${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}"
    user: "${ACTIVEMQ_USER:admin}"
    password: "${ACTIVEMQ_PASSWORD:admin}"
    in-memory: false
  jms:
    pub-sub-domain: true

service:
  wallet-service:
    url: "${WALLET_SERVICE_URL:http://localhost:8082}"
user-service:
  url: "${USER_SERVICE_URL:http://localhost:8081}"
internal:
  secret: "${INTERNAL_SECRET:internal-secret}"