server:
  port: 8081
  tomcat:
    threads:
      max: 60
      min-spare: 5
    accept-count: 50
    connection-timeout: 20s
spring:
  application:
    name: user-service
  jmx:
    enabled: false

  datasource:
    url: "${DB_USER_URL:jdbc:postgresql://localhost:5432/user_service}"
    username: "${DB_USER_USERNAME:Tienld}"
    password: "${DB_USER_PASSWORD:123456}"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 10
      connection-timeout: 3000
      idle-timeout: 180000
      max-lifetime: 300000
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"
      password: "${REDIS_PASSWORD:123456}"
      timeout: 3000
      lettuce:
        pool:
          max-active: 6
          max-idle: 3
          min-idle: 1
          max-wait: 2000
  jpa:
    hibernate:
      ddl-auto: update   # validate | update | create | create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

service:
  wallet-service:
    url: "${WALLET_SERVICE_URL:http://localhost:8082}"
  notification-service:
    url: "${NOTIFICATION_SERVICE_URL:http://localhost:8085}"
internal:
  secret: "${INTERNAL_SECRET}"
jwt:
  secret-key: "${JWT_SECRET_KEY}"
qr:
  secret-key: "${QR_SECRET_KEY}"
otp:
  token-expiration-minutes: 10
